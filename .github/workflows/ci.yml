name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify version manifests are in sync
        run: node scripts/bump-version.mjs --check
      - name: Run renderer contract test
        run: bash tests/test_renderer_contract.sh
      - name: Run command surface test
        run: bash tests/test_command_surface.sh
